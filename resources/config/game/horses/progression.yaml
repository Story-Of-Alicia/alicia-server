# Mastery thresholds from MountMasteryParam and rewards from MountMasteryRewardInfo
mastery:
  params:
    spurMagicCount: 600
    jumpCount: 1200
    slidingTime: 900
    glidingDistance: 8000
  rewards:
    - percent: 25
      userExpAdd: 500
      gameMoneyAdd: 0
    - percent: 50
      userExpAdd: 400
      gameMoneyAdd: 0
    - percent: 75
      userExpAdd: 300
      gameMoneyAdd: 0
    - percent: 100
      userExpAdd: 200
      gameMoneyAdd: 500

# Ranch group force rules from MountGroupForceSelect
groupForces:
  - id: 0
    affectToAll: true
    action: 0
    conditions: []
    effects: []
  - id: 1
    affectToAll: true
    action: 1
    conditions:
      - tendency: 1
        count: 2
    effects:
      - effect: 2
        param: 'value * 0.8'
  - id: 2
    affectToAll: false
    action: 1
    conditions:
      - tendency: 1
        count: 5
      - tendency: 5
        count: 2
    effects:
      - effect: 2
        param: 'value * 0.8'
      - effect: 9
        param: '10'
  - id: 3
    affectToAll: true
    action: 4
    conditions:
      - tendency: 2
        count: 3
    effects:
      - effect: 4
        param: 'value * 1.1'
  - id: 4
    affectToAll: true
    action: 2
    conditions:
      - tendency: 2
        count: 4
      - tendency: 4
        count: 2
    effects:
      - effect: 6
        param: 'value + 5'
  - id: 5
    affectToAll: true
    action: 8
    conditions:
      - tendency: 2
        count: 8
    effects:
      - effect: 8
        param: '1'
      - effect: 3
        param: 'value * 1.2'
  - id: 6
    affectToAll: true
    action: 3
    conditions:
      - tendency: 3
        count: 2
    effects:
      - effect: 3
        param: 'value - value * 0.2'
  - id: 7
    affectToAll: false
    action: 5
    conditions:
      - tendency: 3
        count: 5
      - tendency: 5
        count: 2
    effects:
      - effect: 3
        param: 'value - value * 0.2'
      - effect: 9
        param: '0'
  - id: 8
    affectToAll: true
    action: 1
    conditions:
      - tendency: 1
        count: 4
    effects:
      - effect: 2
        param: 'value * 0.8'
      - effect: 1
        param: 'value - value * 0.3'
  - id: 9
    affectToAll: true
    action: 3
    conditions:
      - tendency: 3
        count: 4
    effects:
      - effect: 5
        param: 'value * 1.1'
  - id: 10
    affectToAll: false
    action: 4
    conditions:
      - tendency: 4
        count: 3
    effects:
      - effect: 10
        param: 'value + 1'
      - effect: 1
        param: 'value * 1.3'
  - id: 11
    affectToAll: false
    action: 6
    conditions:
      - tendency: 5
        count: 3
      - tendency: 3
        count: 3
    effects:
      - effect: 11
        param: 'value + (10 * 100)'
  - id: 12
    affectToAll: false
    action: 6
    conditions:
      - tendency: 5
        count: 3
      - tendency: 1
        count: 3
    effects:
      - effect: 12
        param: '5'
  - id: 13
    affectToAll: false
    action: 6
    conditions:
      - tendency: 5
        count: 4
      - tendency: 4
        count: 4
    effects:
      - effect: 13
        param: '10'
  - id: 14
    affectToAll: true
    action: 0
    conditions:
      - tendency: 5
        count: 2
    effects:
      - effect: 7
        param: 'value * 1.2'

